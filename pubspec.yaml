name: hud_radial_menu
description: >-
  A high-fidelity, interactive HUD radial menu for Flutter. Supports 5 petal
  styles (glassmorphism, neon glow, neumorphic, solid, wireframe) and 5 petal
  shapes, with smooth animations, hover/tap states, and full theming support.
version: 0.1.0
homepage: https://github.com/Dev-Muhammad-Junaid/hud_radial_menu
repository: https://github.com/Dev-Muhammad-Junaid/hud_radial_menu
issue_tracker: https://github.com/Dev-Muhammad-Junaid/hud_radial_menu/issues

topics:
  - ui
  - menu
  - animation
  - widget

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
